[platformio]
src_dir = .

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
board_build.arduino.esp-idf = 5.0
upload_port = COM5
monitor_speed = 115200
upload_speed = 921600

# Libraries required by the sketch
lib_deps =
    Adafruit GFX Library @ ^1.11.9
    Adafruit ILI9341 @ ^1.6.0

# Compiler flags for better compatibility
build_flags =
    -DARDUINO_ARCH_ESP32
    -DBOARD_HAS_PSRAM
    -fno-strict-aliasing

# Monitor settings
monitor_filters = default
monitor_echo = yes
monitor_eol = LF

# Auto-release COM port before upload
extra_scripts = pre:kill_monitor.py
