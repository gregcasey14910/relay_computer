[platformio]
src_dir = .

[env:lolin_s3_mini]
platform = espressif32
board = lolin_s3_mini
framework = arduino
upload_port = COM11
monitor_port = COM11
monitor_speed = 115200
upload_speed = 921600
upload_resetmethod = usb

lib_deps =
    Adafruit NeoPixel @ ^1.12.0
    Adafruit GFX Library @ ^1.11.9
    Adafruit SSD1306 @ ^2.5.9

build_flags =
    -DARDUINO_ARCH_ESP32
    -fno-strict-aliasing

monitor_filters = default
monitor_echo = yes
monitor_eol = LF
