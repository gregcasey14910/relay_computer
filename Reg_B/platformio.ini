[platformio]
src_dir = .

[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_port = COM30
monitor_port = COM30
monitor_speed = 115200
upload_resetmethod = usb
monitor_rts = 0
monitor_dtr = 0

lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit SSD1306

monitor_filters = default
monitor_echo = yes
monitor_eol = LF
